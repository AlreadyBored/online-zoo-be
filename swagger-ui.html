<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Zoo API Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
        }
        .swagger-ui .topbar {
            background-color: #2b3648;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script>
        const spec = {
            "openapi": "3.0.3",
            "info": {
                "title": "Online Zoo API",
                "description": "Backend API for Online Zoo frontend assignment",
                "version": "1.0.0"
            },
            "servers": [
                {
                    "url": "https://{apiId}.execute-api.{region}.amazonaws.com/prod",
                    "description": "AWS API Gateway (replace placeholders or use your exact URL)",
                    "variables": {
                        "apiId": {
                            "default": "your-api-id",
                            "description": "The API ID generated by AWS"
                        },
                        "region": {
                            "default": "us-east-1",
                            "description": "AWS Region"
                        }
                    }
                },
                {
                    "url": "http://localhost:3000",
                    "description": "Local server (if running locally)"
                }
            ],
            "components": {
                "securitySchemes": {
                    "bearerAuth": {
                        "type": "http",
                        "scheme": "bearer",
                        "bearerFormat": "JWT"
                    }
                },
                "schemas": {
                    "ApiResponse": {
                        "type": "object",
                        "properties": {
                            "data": {
                                "type": "object"
                            },
                            "message": {
                                "type": "string"
                            },
                            "error": {
                                "type": "string"
                            },
                            "isTestError": {
                                "type": "boolean"
                            },
                            "timestamp": {
                                "type": "string"
                            }
                        }
                    },
                    "Pet": {
                        "type": "object",
                        "properties": {
                            "id": { "type": "integer" },
                            "name": { "type": "string" },
                            "commonName": { "type": "string" },
                            "description": { "type": "string" }
                        },
                        "required": ["id", "name", "commonName", "description"]
                    },
                    "PetDetail": {
                        "type": "object",
                        "properties": {
                            "id": { "type": "integer" },
                            "commonName": { "type": "string" },
                            "scientificName": { "type": "string" },
                            "type": { "type": "string" },
                            "size": { "type": "string" },
                            "diet": { "type": "string" },
                            "habitat": { "type": "string" },
                            "range": { "type": "string" },
                            "latitude": { "type": "string" },
                            "longitude": { "type": "string" },
                            "description": { "type": "string" },
                            "detailedDescription": { "type": "string" }
                        },
                        "required": ["id", "commonName", "scientificName", "type", "size", "diet", "habitat", "range", "latitude", "longitude", "description", "detailedDescription"]
                    },
                    "Feedback": {
                        "type": "object",
                        "properties": {
                            "id": { "type": "integer" },
                            "city": { "type": "string" },
                            "month": { "type": "string" },
                            "year": { "type": "string" },
                            "text": { "type": "string" },
                            "name": { "type": "string" }
                        },
                        "required": ["id", "city", "month", "year", "text", "name"]
                    },
                    "Camera": {
                        "type": "object",
                        "properties": {
                            "id": { "type": "integer" },
                            "petId": { "type": "integer" },
                            "text": { "type": "string" }
                        },
                        "required": ["id", "text"]
                    },
                    "RegisterPayload": {
                        "type": "object",
                        "properties": {
                            "login": { 
                                "type": "string", 
                                "minLength": 3,
                                "pattern": "^[A-Za-z][A-Za-z]*$",
                                "description": "Login must start with a letter and contain only English letters" 
                            },
                            "password": { 
                                "type": "string", 
                                "minLength": 6,
                                "pattern": "[!@#$%^&*(),.?\":{}|<>]",
                                "description": "Password must be at least 6 characters and contain at least 1 special character"
                            },
                            "name": { 
                                "type": "string", 
                                "minLength": 3,
                                "pattern": "^[A-Za-z\\s]+$",
                                "description": "Name must contain only English letters and spaces"
                            },
                            "email": { 
                                "type": "string", 
                                "format": "email" 
                            }
                        },
                        "required": ["login", "password", "name", "email"]
                    },
                    "LoginPayload": {
                        "type": "object",
                        "properties": {
                            "login": { "type": "string" },
                            "password": { "type": "string" }
                        },
                        "required": ["login", "password"]
                    },
                    "DonationPayload": {
                        "type": "object",
                        "properties": {
                            "name": { "type": "string" },
                            "email": { "type": "string", "format": "email" },
                            "amount": { "type": "number", "minimum": 0.01 },
                            "petId": { "type": "integer" }
                        },
                        "required": ["name", "email", "amount", "petId"]
                    }
                }
            },
            "paths": {
                "/": {
                    "get": {
                        "summary": "Get API Info",
                        "description": "Returns basic information about the API.",
                        "tags": ["Info"],
                        "responses": {
                            "200": {
                                "description": "Successful response",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "object",
                                                            "properties": {
                                                                "name": { "type": "string" },
                                                                "version": { "type": "string" },
                                                                "description": { "type": "string" }
                                                            }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "/pets": {
                    "get": {
                        "summary": "Get all pets",
                        "description": "Retrieves a list of all pets in the zoo.",
                        "tags": ["Pets"],
                        "responses": {
                            "200": {
                                "description": "A list of pets",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "array",
                                                            "items": { "$ref": "#/components/schemas/Pet" }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "/pets/{id}": {
                    "get": {
                        "summary": "Get pet details",
                        "description": "Retrieves detailed information about a specific pet by ID.",
                        "tags": ["Pets"],
                        "parameters": [
                            {
                                "name": "id",
                                "in": "path",
                                "required": true,
                                "description": "The ID of the pet",
                                "schema": {
                                    "type": "integer",
                                    "pattern": "^\\d+$"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Detailed pet information",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": { "$ref": "#/components/schemas/PetDetail" }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            },
                            "404": {
                                "description": "Pet not found"
                            }
                        }
                    }
                },
                "/feedback": {
                    "get": {
                        "summary": "Get feedback",
                        "description": "Retrieves a list of feedback from visitors.",
                        "tags": ["Feedback"],
                        "responses": {
                            "200": {
                                "description": "A list of feedback items",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "array",
                                                            "items": { "$ref": "#/components/schemas/Feedback" }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "/cameras": {
                    "get": {
                        "summary": "Get cameras",
                        "description": "Retrieves a list of camera streams.",
                        "tags": ["Cameras"],
                        "responses": {
                            "200": {
                                "description": "A list of cameras",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "array",
                                                            "items": { "$ref": "#/components/schemas/Camera" }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "/auth/register": {
                    "post": {
                        "summary": "Register a new user",
                        "description": "Registers a new user account.",
                        "tags": ["Auth"],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": { "$ref": "#/components/schemas/RegisterPayload" }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Registration successful",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "object",
                                                            "properties": {
                                                                "token": { "type": "string" },
                                                                "user": {
                                                                    "type": "object",
                                                                    "properties": {
                                                                        "login": { "type": "string" },
                                                                        "name": { "type": "string" },
                                                                        "email": { "type": "string" }
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            },
                            "400": {
                                "description": "Validation error or user already exists"
                            }
                        }
                    }
                },
                "/auth/login": {
                    "post": {
                        "summary": "Login user",
                        "description": "Authenticates a user and returns a JWT token.",
                        "tags": ["Auth"],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": { "$ref": "#/components/schemas/LoginPayload" }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Login successful",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "object",
                                                            "properties": {
                                                                "token": { "type": "string" },
                                                                "user": {
                                                                    "type": "object",
                                                                    "properties": {
                                                                        "login": { "type": "string" },
                                                                        "name": { "type": "string" },
                                                                        "email": { "type": "string" }
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            },
                            "401": {
                                "description": "Invalid credentials"
                            }
                        }
                    }
                },
                "/auth/profile": {
                    "get": {
                        "summary": "Get user profile",
                        "description": "Retrieves the profile of the currently authenticated user.",
                        "tags": ["Auth"],
                        "security": [
                            {
                                "bearerAuth": []
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Profile retrieved successfully",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "object",
                                                            "properties": {
                                                                "login": { "type": "string" },
                                                                "name": { "type": "string" },
                                                                "email": { "type": "string" },
                                                                "iat": { "type": "integer" },
                                                                "exp": { "type": "integer" }
                                                            }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            },
                            "401": {
                                "description": "Unauthorized - Missing or invalid token"
                            }
                        }
                    }
                },
                "/donations": {
                    "post": {
                        "summary": "Make a donation",
                        "description": "Submits a donation for a specific pet.",
                        "tags": ["Donations"],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": { "$ref": "#/components/schemas/DonationPayload" }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Donation successful",
                                "content": {
                                    "application/json": {
                                        "schema": {
                                            "allOf": [
                                                { "$ref": "#/components/schemas/ApiResponse" },
                                                {
                                                    "type": "object",
                                                    "properties": {
                                                        "data": {
                                                            "type": "object",
                                                            "properties": {
                                                                "success": { "type": "boolean" },
                                                                "donationId": { "type": "string" },
                                                                "amount": { "type": "number" },
                                                                "petId": { "type": "integer" }
                                                            }
                                                        }
                                                    }
                                                }
                                            ]
                                        }
                                    }
                                }
                            },
                            "400": {
                                "description": "Validation error"
                            }
                        }
                    }
                }
            }
        };

        window.onload = function() {
            window.ui = SwaggerUIBundle({
                spec: spec,
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout"
            });
        };
    </script>
</body>
</html>
